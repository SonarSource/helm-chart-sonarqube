community:
  enabled: true

jdbcOverwrite:
  enabled: true
  jdbcUrl: "jdbc:postgresql://postgres.example.svc:5432/sonarqube?currentSchema=public"
  jdbcUsername: sonarqube
  jdbcPassword: sonarqube

agenticHarness:
  enabled: true
  orchestrator:
    image:
      repository: example/agentic-orchestrator
      tag: "1.0.0"
    storage:
      accessKey: mykey
      secretKey: mysecret
  runtimes:
    hunter:
      image:
        repository: example/hunter-runtime
        tag: "1.0.0"
