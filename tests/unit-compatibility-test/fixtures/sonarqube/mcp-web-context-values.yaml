apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-web-context-values.yaml-sonarqube-mcp
  labels:
    app: sonarqube
    chart: sonarqube-2026.3.0
    release: mcp-web-context-values.yaml
    heritage: Helm
    app.kubernetes.io/component: mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarqube-mcp
      release: mcp-web-context-values.yaml
  template:
    metadata:
      labels:
        app: sonarqube-mcp
        release: mcp-web-context-values.yaml
    spec:
      initContainers:
        - name: wait-for-sonarqube
          image: sonarqube:2026.3.0-enterprise
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 0
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          command:
            - sh
            - -c
            - |
              until curl -sf "http://mcp-web-context-values.yaml-sonarqube:9000/sonarqube-pre-prod/api/system/status" | grep -q '"status":"UP"'; do
                echo "Waiting for SonarQube to be UP..."; sleep 10;
              done
      containers:
        - name: mcp
          image: mcp/sonarqube:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: STORAGE_PATH
              value: /data
            - name: SONARQUBE_URL
              value: http://mcp-web-context-values.yaml-sonarqube:9000/sonarqube-pre-prod
            - name: SONARQUBE_HTTP_HOST
              value: "0.0.0.0"
            - name: SONARQUBE_HTTP_PORT
              value: "8080"
            - name: SONARQUBE_TRANSPORT
              value: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 6
            timeoutSeconds: 1
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            runAsGroup: 0
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: mcp-data
              mountPath: /data
      volumes:
        - name: mcp-data
          persistentVolumeClaim:
            claimName: mcp-web-context-values.yaml-sonarqube-mcp
