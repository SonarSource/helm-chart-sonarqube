# Source: sonarqube-dce/templates/agentic-orchestrator.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentic-harness-values.yaml-sonarqube-dce-agentic-orchestrator
  labels:
    app: sonarqube-dce
    chart: sonarqube-dce-2026.5.0
    release: agentic-harness-values.yaml
    heritage: Helm
    sonarqube.agentic/component: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarqube-dce
      sonarqube.agentic/component: orchestrator
  template:
    metadata:
      labels:
        app: sonarqube-dce
        release: agentic-harness-values.yaml
        sonarqube.agentic/component: orchestrator
    spec:
      automountServiceAccountToken: true
      initContainers:
        - name: wait-for-sonarqube
          image: sonarqube:2026.4.0-datacenter-app
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 0
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          command:
            - sh
            - -c
            - |
              until curl -sf "http://agentic-harness-values.yaml-sonarqube-dce:9000/api/system/status" | grep -q '"status":"UP"'; do
                echo "Waiting for SonarQube to be UP..."; sleep 10;
              done
      containers:
        - name: agentic-orchestrator
          image: "example.com/unifiedagenticharness/agentorchestrator:1.0.0"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: CORE_DB_READ_WRITE_ENDPOINT
              value: "myPostgres"
            - name: CORE_DB_NAME
              value: "myDatabase"
            - name: CORE_DB_USERNAME
              value: "user"
            - name: CORE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agentic-harness-values.yaml-sonarqube-dce
                  key: jdbc-password
            - name: AGENTIC_STORAGE_ENDPOINT
              value: ""
            - name: AGENTIC_STORAGE_REGION
              value: "eu-west-1"
            - name: AGENTIC_STORAGE_BUCKET
              value: "agentic-artifacts"
            - name: AGENTIC_STORAGE_PATH_STYLE
              value: "false"
            - name: AGENTIC_SONARQUBE_URL
              value: "http://agentic-harness-values.yaml-sonarqube-dce:9000"
            - name: AGENTIC_SONARQUBE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agentic-harness-values.yaml-sonarqube-dce-agentic-orchestrator
                  key: AGENTIC_SONARQUBE_TOKEN
            - name: AGENTIC_REMEDIATION_RUNTIME_PUSH_URL
              value: "http://agentic-harness-values.yaml-sonarqube-dce-agentic-runtime-remed:8090/jobs"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
      serviceAccountName: agent-orchestrator
