edition: enterprise

mcp:
  enabled: true
  image:
    repository: mcp/sonarqube
    tag: "1.0.0"
  port: 8080
  persistence:
    enabled: false
  tls:
    enabled: true
    keystoreSecretName: mcp-keystore-secret
    keystoreSecretKey: keystore.p12
    passwordSecretName: mcp-keystore-password
    passwordSecretKey: password
    keystoreType: PKCS12
