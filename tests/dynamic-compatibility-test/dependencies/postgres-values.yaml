# Bitnami PostgreSQL values for SonarQube dynamic compatibility tests.
# Hardcoded credentials — these are test-only and never reach a real environment.
#
# The same values must be referenced by the JDBC config passed to the
# sonarqube-dce chart.

auth:
  username: sonar
  password: sonarpass
  database: sonar
  postgresPassword: sonarpass

# Persistence is disabled because each test creates a fresh namespace and tears
# it down at the end — there is nothing to keep between runs, and skipping the
# PVC removes a dependency on the cluster's StorageClass.
primary:
  persistence:
    enabled: false

volumePermissions:
  enabled: false

shmVolume:
  enabled: false
