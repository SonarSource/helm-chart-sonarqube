# Bitnami PostgreSQL values for SonarQube dynamic compatibility tests.

# Persistence is disabled because each test creates a fresh namespace and tears
# it down at the end — there is nothing to keep between runs, and skipping the
# PVC removes a dependency on the cluster's StorageClass.
primary:
  persistence:
    enabled: false

volumePermissions:
  enabled: false

shmVolume:
  enabled: false
