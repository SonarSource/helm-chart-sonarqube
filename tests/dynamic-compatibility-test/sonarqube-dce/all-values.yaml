# tests/unit-compatibility-test/sonarqube-dce/jdbc-config-values.yaml # It requires an external db
# tests/unit-compatibility-test/sonarqube-dce/networkpolicy-values.yaml
# The chart's built-in egress rules don't include the external Postgres pod
# we install in setupDB, so the app pods can't reach the DB unless we
# add an explicit allow rule. NetworkPolicies are additive in Kubernetes — the
# rules from this extra policy union with the chart's defaults.
networkPolicy:
  enabled: true
  prometheusNamespace: "monitoring"
  additionalNetworkPolicies:
    podSelector:
      matchLabels:
        app: sonarqube-dce
        sonarqube.datacenter/type: app
    policyTypes:
      - Egress
    egress:
      - to:
          - podSelector:
              matchLabels:
                app.kubernetes.io/name: postgresql
        ports:
          - port: 5432
            protocol: TCP

jdbcOverwrite:
  enabled: true
  jdbcUrl: "jdbc:postgresql://external-postgres-postgresql:5432/sonar"
  jdbcUsername: sonar
  # Reference the password from the Bitnami-generated secret instead of the
  # deprecated `jdbcPassword` field. The secret is created by setupDB().
  jdbcSecretName: external-postgres-postgresql
  jdbcSecretPasswordKey: password

