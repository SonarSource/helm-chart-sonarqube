{{- if and .Values.agenticHarness.enabled .Values.agenticHarness.serviceAccount.create }}
{{- /*
Dedicated ServiceAccounts for the agentic workloads: one for the orchestrator and one per enabled
runtime family. Each carries the shared agenticHarness.serviceAccount.annotations, merged with any
per-component serviceAccount.annotations override (the component override wins), so each pod can bind
its own cloud identity (e.g. an AWS IAM role via IRSA). Names are resolved by the helpers so an
external IAM trust policy can pin exact k8s subjects.
*/}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sonarqube.agentic.orchestrator.serviceAccountName" . }}
  labels:
    app: {{ template "sonarqube.name" . }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
    sonarqube.agentic/component: orchestrator
  {{- $ann := merge (deepCopy (dig "serviceAccount" "annotations" (dict) .Values.agenticHarness.orchestrator)) .Values.agenticHarness.serviceAccount.annotations }}
  {{- if $ann }}
  annotations:
{{ toYaml $ann | indent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.agenticHarness.serviceAccount.automountToken }}
{{- range $family, $cfg := .Values.agenticHarness.runtimes }}
{{- if $cfg.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sonarqube.agentic.runtime.serviceAccountName" (dict "ctx" $ "family" $family) }}
  labels:
    app: {{ template "sonarqube.name" $ }}
    chart: {{ $.Chart.Name }}-{{ $.Chart.Version | replace "+" "_" }}
    release: {{ $.Release.Name }}
    heritage: {{ $.Release.Service }}
    sonarqube.agentic/component: runtime
    sonarqube.agentic/family: {{ $family }}
  {{- $rann := merge (deepCopy (dig "serviceAccount" "annotations" (dict) $cfg)) $.Values.agenticHarness.serviceAccount.annotations }}
  {{- if $rann }}
  annotations:
{{ toYaml $rann | indent 4 }}
  {{- end }}
automountServiceAccountToken: {{ $.Values.agenticHarness.serviceAccount.automountToken }}
{{- end }}
{{- end }}
{{- end }}
