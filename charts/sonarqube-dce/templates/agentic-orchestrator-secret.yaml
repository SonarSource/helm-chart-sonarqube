{{- $storage := .Values.agenticHarness.orchestrator.storage }}
{{- $token := .Values.agenticHarness.orchestrator.sonarqubeToken }}
{{- /* Inline storage keys only when given and not sourced from an existingSecret; omit entirely for
       credential-less (IAM role / IRSA) access so no empty-valued keys are created. */}}
{{- $inlineStorage := and (not $storage.existingSecret) (or $storage.accessKey $storage.secretKey) }}
{{- $inlineToken := and (not $token.existingSecret) $token.token }}
{{- if and .Values.agenticHarness.enabled (or $inlineStorage $inlineToken) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sonarqube.agentic.orchestrator.fullname" . }}
  labels:
    app: {{ template "sonarqube.name" . }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
    sonarqube.agentic/component: orchestrator
type: Opaque
data:
  {{- if $inlineStorage }}
  AGENTIC_STORAGE_ACCESS_KEY: {{ $storage.accessKey | b64enc | quote }}
  AGENTIC_STORAGE_SECRET_KEY: {{ $storage.secretKey | b64enc | quote }}
  {{- end }}
  {{- if $inlineToken }}
  AGENTIC_SONARQUBE_TOKEN: {{ $token.token | b64enc | quote }}
  {{- end }}
{{- end }}
