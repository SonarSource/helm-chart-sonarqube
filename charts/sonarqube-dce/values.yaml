# Default values for sonarqube.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

searchNodes:
  image:
    repository: sonarqube
    tag: 2026.4.0-datacenter-search
    pullPolicy: IfNotPresent
    # If using a private repository, the imagePullSecrets to use
    # pullSecrets:
    #   - name: my-repo-secret

  ## Annotations to add to the search pods
  ##
  # annotations:
  #   key: value

  ## Environment variables to attach to the search pods
  ##
  # env:
  #   # If you use a different ingress path from /, you have to add it here as the value of SONAR_WEB_CONTEXT
  #   - name: SONAR_WEB_CONTEXT
  #     value: /sonarqube
  #   - name: VARIABLE
  #     value: my-value

  ## Labels to add to the search pods
  ##
  # podLabels:
  #   key: value

  # A custom sonar.properties file can be provided via dictionary.
  # For example:
  # sonarProperties:
  #   sonar.log.level: DEBUG
  #   sonar.security.realm: LDAP
  #   ldap.url: ldaps://organization.com

  # Additional sonar properties to load from a secret with a key "secret.properties" (must be a string)
  # sonarSecretProperties:

  # Securing the Search Cluster with basic authentication and TLS in between search nodes
  searchAuthentication:
    enabled: false

    # Existing Keystore/Truststore to be used
    keyStoreSecret: ""

    # Password to said Keystore/Truststore if set (optional)
    keyStorePassword: ""
    # You can also use a existing secret for that. This one will overwrite the one set previously
    # keyStorePasswordSecret: ""

    # A User Password that will be used to authenticate against the Search Cluster
    userPassword: ""

  replicaCount: 3

  # Pod Disruption Budget for search nodes
  podDisruptionBudget:
    minAvailable: 2

  # (DEPRECATED typo) Please use searchNodes.podDisruptionBudget instead
  # podDistributionBudget:
  #   minAvailable: 2

  # Set security context for sonarqube search pods
  # The current section contains the default values set in a generic Kubernetes cluster. If you are using OpenShift, you should not set any specific fsGroup.
  securityContext:
    fsGroup: 0

  # Set security context for sonarqube search container
  # The current section contains the default values set in a generic Kubernetes cluster. If you are using OpenShift, you should not set any specific UID or GID to be used for the execution.
  containerSecurityContext:
    # Sonarqube dockerfile creates sonarqube user as UID 1000 and GID 0
    # Those default are used to match pod security standard restricted as least privileged approach
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 0
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop: ["ALL"]
  #   readOnlyRootFilesystem: true

  # Probe threshold configuration for the search nodes
  readinessProbe:
    initialDelaySeconds: 0
    periodSeconds: 30
    failureThreshold: 6
    # Note that timeoutSeconds was not respected before Kubernetes 1.20 for exec probes
    timeoutSeconds: 1
  livenessProbe:
    initialDelaySeconds: 0
    periodSeconds: 30
    failureThreshold: 6
    # Note that timeoutSeconds was not respected before Kubernetes 1.20 for exec probes
    timeoutSeconds: 1
  startupProbe:
    initialDelaySeconds: 20
    periodSeconds: 10
    failureThreshold: 24
    # Note that timeoutSeconds was not respected before Kubernetes 1.20 for exec probes
    timeoutSeconds: 1

  ## We usually don't make specific resource recommendations, as they are heavily dependent on
  ## The usage of SonarQube and the surrounding infrastructure.
  ## Those default are based on the default -Xmx2G -Xms2G settings of searchNodes sub processes.
  ## Adjust these values to your needs, you can find more details on the main README of the chart.
  resources:
    limits:
      cpu: 800m
      memory: 3072M
      ephemeral-storage: 512000M
    requests:
      cpu: 400m
      memory: 3072M
      ephemeral-storage: 1536M
  persistence:
    enabled: true
    ## Set annotations on pvc
    annotations: {}

    ## If defined, storageClassName: <storageClass>
    ## If set to "-", storageClassName: "", which disables dynamic provisioning
    ## If undefined (the default) or set to null, no storageClassName spec is
    ##   set, choosing the default provisioner.  (gp2 on AWS, standard on
    ##   GKE, AWS & OpenStack)
    ##
    storageClass:
    accessMode: ReadWriteOnce
    size: 5Gi
    uid: 1000
    guid: 0

  ## Array of extra containers to run alongside the sonarqube search container
  ##
  ## Example:
  ## - name: myapp-container
  ##   image: busybox
  ##   command: ['sh', '-c', 'echo Hello && sleep 3600']
  ##
  extraContainers: []
  ## Array of extra init containers to run before the sonarqube search container
  ##
  ## Example:
  ## - name: my-init-container
  ##   image: busybox
  ##   command: ['sh', '-c', 'echo Hello']
  ##
  extraInitContainers: []
  # if the global .Values.nodeSelector is set, the following one will be ignored
  nodeSelector: {}
  # if the global .Values.affinity is set, the following one will be ignored
  affinity: {}
  # if the global .Values.tolerations is set, the following one will be ignored
  tolerations: []
  # Topology spread constraints to apply to the search pods
  # Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/topology-spread-constraints/
  topologySpreadConstraints: []

applicationNodes:
  image:
    repository: sonarqube
    tag: 2026.4.0-datacenter-app
    pullPolicy: IfNotPresent
    # If using a private repository, the imagePullSecrets to use
    # pullSecrets:
    #   - name: my-repo-secret

  # Annotations to add to the application pods
  #
  # annotations:
  #   key: value

  ## Environment variables to attach to the application pods
  ##
  # env:
  #   - name: VARIABLE
  #     value: my-value

  ## Labels to add to the application pods
  ##
  # podLabels:
  #   key: value

  # A custom sonar.properties file can be provided via dictionary.
  # For example:
  # sonarProperties:
  #   sonar.log.level: DEBUG
  #   sonar.security.realm: LDAP
  #   ldap.url: ldaps://organization.com

  # Additional sonar properties to load from a secret with a key "secret.properties" (must be a string)
  # sonarSecretProperties:

  replicaCount: 2

  # How many revisions to retain (Deployment ReplicaSets)
  revisionHistoryLimit: 10

  # Pod Disruption Budget for app nodes
  podDisruptionBudget:
    minAvailable: 1

  # (DEPRECATED typo) Please use applicationNodes.podDisruptionBudget instead
  # podDistributionBudget:
  #   minAvailable: 2

  # Set security context for sonarqube app pods
  # The current section contains the default values set in a generic Kubernetes cluster. If you are using OpenShift, you should not set any specific fsGroup.
  securityContext:
    fsGroup: 0

  # Set security context for sonarqube app container
  # The current section contains the default values set in a generic Kubernetes cluster. If you are using OpenShift, you should not set any specific UID or GID to be used for the execution.
  containerSecurityContext:
    # Sonarqube dockerfile creates sonarqube user as UID 1000 and GID 0
    # Those default are used to match pod security standard restricted as least privileged approach
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 0
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop: ["ALL"]
  #   readOnlyRootFilesystem: true

  readinessProbe:
    exec:
      command:
      - sh
      - -c
      - |
        #!/bin/bash
        # A Sonarqube container is considered ready if the status is UP, DB_MIGRATION_NEEDED or DB_MIGRATION_RUNNING
        # status about migration are added to prevent the node to be kill while sonarqube is upgrading the database.
        {{- include "sonarqube.probeHostScript" . | nindent 16 }}
        if curl --noproxy "*" -s http://${host}:{{ .Values.service.internalPort }}{{ .Values.ApplicationNodes.readinessProbe.sonarWebContext | default (include "sonarqube.webcontext" .) }}api/system/status | grep -q -e '"status":"UP"' -e '"status":"DB_MIGRATION_NEEDED"' -e '"status":"DB_MIGRATION_RUNNING"'; then
          exit 0
        fi
        exit 1
    initialDelaySeconds: 0
    periodSeconds: 30
    failureThreshold: 8
    # Note that timeoutSeconds was not respected before Kubernetes 1.20 for exec probes
    timeoutSeconds: 1
    # If an ingress *path* other than the root (/) is defined, it should be reflected here
    # A trailing "/" must be included
    # deprecated please use sonarWebContext at the value top level
    # sonarWebContext: /
  livenessProbe:
    exec:
      command:
      - sh
      - -c
      - |
        {{- include "sonarqube.probeHostScript" . | nindent 16 }}
        curl --noproxy "*" -fsS -o /dev/null --max-time {{ .Values.ApplicationNodes.livenessProbe.timeoutSeconds }} -H "X-Sonar-Passcode: $SONAR_WEB_SYSTEMPASSCODE" "http://${host}:{{ .Values.service.internalPort }}{{ .Values.ApplicationNodes.livenessProbe.sonarWebContext | default (include "sonarqube.webcontext" .) }}api/system/liveness"
    initialDelaySeconds: 0
    periodSeconds: 30
    failureThreshold: 6
    # Note that timeoutSeconds was not respected before Kubernetes 1.20 for exec probes
    timeoutSeconds: 1
    # If an ingress *path* other than the root (/) is defined, it should be reflected here
    # A trailing "/" must be included
    # deprecated please use sonarWebContext at the value top level
    # sonarWebContext: /
  startupProbe:
    initialDelaySeconds: 45
    periodSeconds: 10
    failureThreshold: 32
    # Note that timeoutSeconds was not respected before Kubernetes 1.20 for exec probes
    timeoutSeconds: 1
    # If an ingress *path* other than the root (/) is defined, it should be reflected here
    # A trailing "/" must be included
    # deprecated please use sonarWebContext at the value top level
    # sonarWebContext: /

  prometheusExporter:
    enabled: false
    # jmx_prometheus_javaagent version to download from Maven Central
    version: "0.17.2"
    # Alternative full download URL for the jmx_prometheus_javaagent.jar (overrides prometheusExporter.version)
    # downloadURL: ""
    # if you need to ignore TLS certificates for whatever reason enable the following flag
    noCheckCertificate: false

    # Ports for the jmx prometheus agent to export metrics at
    webBeanPort: 8000
    ceBeanPort: 8001

    config:
      rules:
        - pattern: ".*"
    # Overrides config for the CE process Prometheus exporter (by default, the same rules are used for both the Web and CE processes).
    # ceConfig:
    #   rules:
    #     - pattern: ".*"
    # image: curlimages/curl:8.2.1
    # For use behind a corporate proxy when downloading prometheus
    # httpProxy: ""
    # httpsProxy: ""
    # noProxy: ""
    # Setting the security context to the default sonarqube user 1000/0
    # Reuse default initcontainers.securityContext that match restricted pod security standard
    # securityContext: {}

  prometheusMonitoring:
    # Generate a Prometheus Pod Monitor (https://github.com/coreos/prometheus-operator)
    #
    podMonitor:
      # Create PodMonitor Resource for Prometheus scraping
      enabled: false
      # (DEPRECATED) Specify a custom namespace where the PodMonitor will be created.
      # This value should not be set, as the PodMonitor's namespace has to match the Release Namespace.
      # namespace: "default"
      # Specify the interval how often metrics should be scraped
      interval: 30s
      # Specify the timeout after a scrape is ended
      # scrapeTimeout: ""
      # Name of the label on target services that prometheus uses as job name
      # jobLabel: ""
      # Additional labels to add to the PodMonitor
      # labels: {}

  # List of plugins to install.
  # For example:
  # plugins:
  #  install:
  #    - "https://github.com/AmadeusITGroup/sonar-stash/releases/download/1.3.0/sonar-stash-plugin-1.3.0.jar"
  #    - "https://github.com/SonarSource/sonar-ldap/releases/download/2.2-RC3/sonar-ldap-plugin-2.2.0.601.jar"
  #
  plugins:
    install: []

    # For use behind a corporate proxy when downloading plugins
    # httpProxy: ""
    # httpsProxy: ""
    # noProxy: ""

    # image: curlimages/curl:8.2.1
    # resources: {}

    # .netrc secret file with a key "netrc" to use basic auth while downloading plugins
    # netrcCreds: ""

    # Set to true to not validate the server's certificate to download plugin
    noCheckCertificate: false
    # Reuse default initcontainers.securityContext that match restricted pod security standard
    # securityContext: {}

  ## (DEPRECATED) The following value sets SONAR_WEB_JAVAOPTS (e.g., jvmOpts: "-Djava.net.preferIPv4Stack=true"). However, this is deprecated, please set SONAR_WEB_JAVAOPTS or sonar.web.javaOpts directly instead.
  jvmOpts: ""

  ## (DEPRECATED) The following value sets SONAR_CE_JAVAOPTS. However, this is deprecated, please set SONAR_CE_JAVAOPTS or sonar.ce.javaOpts directly instead.
  jvmCeOpts: ""

  # Set this value with a HS256 key encoded with base64. You can generate a key using the following command on a Unix system: echo -n "your_secret" | openssl dgst -sha256 -hmac "your_key" -binary | base64
  jwtSecret: ""
  # can use existing secret with SONAR_AUTH_JWTBASE64HS256SECRET as key
  # existingJwtSecret: ""


  ## We usually don't make specific resource recommendations, as they are heavily dependent on
  ## the usage of SonarQube and the surrounding infrastructure.
  ## Those default are based on the default Web -Xmx1G -Xms128m and CE -Xmx2G -Xms128m settings of applicationNode sub processes.
  ## Adjust these values to your needs, you can find more details on the main README of the chart.
  resources:
    limits:
      cpu: 800m
      memory: 4096M
      ephemeral-storage: 512000M
    requests:
      cpu: 400m
      memory: 4096M
      ephemeral-storage: 1536M

  ## Array of extra containers to run alongside the sonarqube application container
  ##
  ## Example:
  ## - name: myapp-container
  ##   image: busybox
  ##   command: ['sh', '-c', 'echo Hello && sleep 3600']
  ##
  extraContainers: []
  ## Array of extra init containers to run before the sonarqube application container
  ##
  ## Example:
  ## - name: my-init-container
  ##   image: busybox
  ##   command: ['sh', '-c', 'echo Hello']
  ##
  extraInitContainers: []
  ## Array of extra volumes and VolumeMounts to add to the SonarQube deployment
  extraVolumes: []
  extraVolumeMounts: []

  # Define the Horizontal Pod Autoscaler for the app deployment
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 80
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 60
        policies:
          - type: Pods
            value: 1
            periodSeconds: 20
      scaleUp:
        stabilizationWindowSeconds: 10
        policies:
          - type: Percent
            value: 100
            periodSeconds: 600
  # if the global .Values.nodeSelector is set, the following one will be ignored
  nodeSelector: {}
  # if the global .Values.affinity is set, the following one will be ignored
  affinity: {}
  # if the global .Values.tolerations is set, the following one will be ignored
  tolerations: []
  # Topology spread constraints to apply to the application pods
  # Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/topology-spread-constraints/
  topologySpreadConstraints: []

  ## The following values are used to set the ports for the Hazelcast cluster communication
  # The port used by the application nodes to communicate with each other. (If unset, it will be assigned to 9003)
  # port: 9003
  # The port used by the web process to communicate with other application nodes (If unset, it will be dynamically allocated)
  # webPort: 4023
  # The port used by the compute engine process to communicate with other application nodes (If unset, it will be dynamically allocated)
  # cePort: 4024


## This sets the TLS encryption between application and search nodes
nodeEncryption:
  enabled: false

## OpenShift specific configuration
OpenShift:
  enabled: false
  # (Deprecated) this parameter should not be needed anymore, we support Openshift SCCv2 by default when Openshift.enabled=true
  createSCC: false
  route:
    enabled: false
    host: "sonarqube.your-org.com"
    path: "/"
    # Add tls section to secure traffic.
    tls:
      termination: edge
      # certificate:
      # key:
      # caCertificate:
      # insecureEdgeTerminationPolicy: Redirect
    wildcardPolicy: None
    annotations: {}
    # See Openshift/OKD route annotation
    # https://docs.openshift.com/container-platform/4.10/networking/routes/route-configuration.html#nw-route-specific-annotations_route-configuration
    # haproxy.router.openshift.io/timeout: 1m
    # Additional labels for Route manifest file
    # labels:
    #  external: 'true'

# will be used as default for ingress/httproute path and probes path, will be injected in .Values.env as SONAR_WEB_CONTEXT
# if .Values.ApplicationNodes.env.SONAR_WEB_CONTEXT is set, this value will be ignored
sonarWebContext: ""

httproute:
  enabled: false
  # gateway: my-gateway
  # gatewayNamespace: my-gateway-namespace # optional
  # labels:
  #   somelabel: somevalue
  # hostnames:
  #   - sonarqube.your-org.com
  # The rules are optional, by default we will create one with the SonarWebContext prefix and the SonarQube service values
  # rules:
  # - matches:
  #   - path:
  #       type: PathPrefix
  #       value: /bar
  #   backendRefs:
  #   - name: my-service1
  #     port: 8080

service:
  type: ClusterIP
  externalPort: 9000
  internalPort: 9000
  labels:
  annotations: {}
  # May be used in example for internal load balancing in GCP:
  # cloud.google.com/load-balancer-type: Internal
  # loadBalancerSourceRanges:
  #   - 0.0.0.0/0
  # loadBalancerIP: 1.2.3.4

# Those proxy settings will be propagated to the install-plugin and prometheus-exporter init containers
# if httpProxySecret is set the other one will be ignored
# the secret should contain exactly the keys http_proxy, https_proxy and no_proxy
httpProxySecret: ""
httpProxy: ""
httpsProxy: ""
noProxy: ""

ingress:
  enabled: false
  # Used to create an Ingress record.
  hosts:
    - name: sonarqube.your-org.com
  #     Different clouds or configurations might need /* as the default path
  #     path: /
      # For additional control over serviceName and servicePort
      # serviceName: someService
      # servicePort: somePort
      # the pathType can be one of the following values: Exact|Prefix|ImplementationSpecific(default)
      # pathType: ImplementationSpecific
  annotations: {}
  # kubernetes.io/tls-acme: "true"

  # Set the ingressClassName on the ingress record. Required, since this chart
  # no longer bundles an ingress-nginx controller to default it from.
  # ingressClassName: nginx

# Additional labels for Ingress manifest file
  # labels:
  #  traffic-type: external
  #  traffic-type: internal
  tls: []
  # Secrets must be manually created in the namespace. To generate a self-signed certificate (and private key) and then create the secret in the cluster please refer to your ingress controller's documentation.
  # - secretName: chart-example-tls
  #   hosts:
  #     - chart-example.local

# Affinity for pod assignment
# Ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#affinity-and-anti-affinity
affinity: {}

# Tolerations for pod assignment
# Ref: https://kubernetes.io/docs/concepts/configuration/taint-and-toleration/
# taint a node with the following command to mark it as not schedulable for new pods
# kubectl taint nodes <node> sonarqube=true:NoSchedule
# The following statement will tolerate this taint and as such reverse a node for sonarqube
tolerations: []
#  - key: "sonarqube"
#    operator: "Equal"
#    value: "true"
#    effect: "NoSchedule"

# Node labels for pod assignment
# Ref: https://kubernetes.io/docs/user-guide/node-selection/
# add a label to a node with the following command
# kubectl label node <node> sonarqube=true
nodeSelector: {}
#  sonarqube: "true"

# Uncomment this to scheduler pods on priority
# priorityClassName: "high-priority"

# hostAliases allows the modification of the hosts file inside a container
hostAliases: []
# - ip: "192.168.1.10"
#   hostnames:
#   - "example.com"
#   - "www.example.com"

# Optionally create Network Policies
networkPolicy:
  enabled: false

  # If you plan on using the jmx exporter, you need to define where the traffic is coming from
  prometheusNamespace: "monitoring"

  # If you are using a external database and enable network Policies to be created
  # you will need to explicitly allow egress traffic to your database
  # (DEPRECATED) please use additionalNetworkPolicies instead
  # additionalNetworkPolicys:
  # expects https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.21/#networkpolicyspec-v1-networking-k8s-io
  # additionalNetworkPolicies:

initContainers:
  # all initContainers use SonarQube image by default, but you can override it by setting the image field (ex image: ubuntu:24.04)
  # image:
  # Set the security context for the init containers
  # The current section contains the default values set in a generic Kubernetes cluster. If you are using OpenShift, you should not set any specific UID or GID to be used for the execution.
  # We allow the init containers to have a separate security context declaration because
  # the initContainer may not require the same as SonarQube.
  securityContext:
    # Those default are used to match pod security standard restricted as least privileged approach
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 0
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop: ["ALL"]
    readOnlyRootFilesystem: true
  # We allow the init containers to have a separate resources declaration because
  # the initContainer does not take as much resources.
  resources: {}

# (DEPRECATED) Please use searchNodes.extraInitContainers or applicationNodes.extraInitContainers instead.
# Kept for backward compatibility: when set, applies to the search nodes.
extraInitContainers: {}

## Provide a secret containing one or more certificate files in the keys that will be added to cacerts
## The cacerts file will be set via SONARQUBE_WEB_JVM_OPTS and SONAR_CE_JAVAOPTS
##
caCerts:
  enabled: false
  # image:
  # secret: your-secret-name

  # Optionally, you can store your certificate in a ConfigMap and use it as:
  # configMap:
  #   name: my-custom-cacerts-certificate
  #   key: key
  #   path: my-certificate.crt

initSysctl:
  enabled: true
  vmMaxMapCount: 524288
  fsFileMax: 131072
  nofile: 131072
  nproc: 8192
  # all initContainers use SonarQube image by default, but you can override it by setting the image field (ex image: ubuntu:24.04)
  # image:
  securityContext:
    # Compatible with podSecurity standard privileged
    privileged: true
    # if run without root permissions, error "sysctl: permission denied on key xxx, ignoring"
    runAsUser: 0
    readOnlyRootFilesystem: true
  # resources: {}

initFs:
  enabled: true
  # all initContainers use SonarQube image by default, but you can override it by setting the image field (ex image: ubuntu:24.04)
  # image:
  # Compatible with podSecurity standard baseline
  securityContext:
    privileged: false
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop: ["ALL"]
      add: ["CHOWN"]
    readOnlyRootFilesystem: true

# a monitoring passcode needs to be defined in order to get reasonable probe results
# not setting the monitoring passcode will result in a deployment that will never be ready
# monitoringPasscode: "define_it"
# Alternatively, you can define the passcode loading it from an existing secret specifying the right key
# monitoringPasscodeSecretName: "pass-secret-name"
# monitoringPasscodeSecretKey: "pass-key"

## Environment variables to attach to the pods
##
# env:
#   - name: VARIABLE
#     value: my-value

# Set annotations for pods
annotations: {}

# In case you want to specify different resources for emptyDir than {}
emptyDir: {}
  # Example of resouces that might be used:
  # medium: Memory
  # sizeLimit: 16Mi

# Kubernetes secret that contains the encryption key for the sonarqube instance.
# The secret must contain the key 'sonar-secret.txt'.
# The 'sonar.secretKeyPath' property will be set automatically.
# sonarSecretKey: "settings-encryption-secret"

## Override JDBC values
## for external Databases
jdbcOverwrite:
  # (DEPRECATED) It is now required to connect to an external database
  # enable: true
  # (DEPRECATED) It is now required to connect to an external database
  enabled: true
  # The JDBC url of the external DB
  jdbcUrl: "jdbc:postgresql://myPostgres/myDatabase"
  # The DB user that should be used for the JDBC connection
  jdbcUsername: ""
  # (DEPRECATED) Please use `jdbcOverwrite.jdbcSecretName` along with `jdbcOverwrite.jdbcSecretPasswordKey` instead
  jdbcPassword: ""
  ## Alternatively, use a pre-existing k8s secret containing the DB password
  # jdbcSecretName: "sonarqube-jdbc"
  ## and the secretValueKey of the password found within that secret
  # jdbcSecretPasswordKey: "jdbc-password"
  # To install the oracle JDBC driver, set the following URL (in this example, we set the URL for the Oracle 11 driver. Please update it to your target driver URL.).
  # If downloading the driver requires authentication, please set the .netrc secret file with a key "netrc" to use basic auth.
  # oracleJdbcDriver:
  #   url: "https://download.oracle.com/otn-pub/otn_software/jdbc/2113/ojdbc11.jar"
  #   netrcCreds: ""

# Additional labels to add to the pods:
# podLabels:
#   key: value
podLabels: {}
# (DEPRECATED) this field will be removed, as it needs to match the SonarQube image folder structure, considering we have one chart version per docker image version this field is not needed anymore.
sonarqubeFolder: /opt/sonarqube

# (DEPRECATED) Enable/Disable logging in JSON format
# This is deprecated in favor of the ENV var SONAR_LOG_JSONOUTPUT or the sonar.properties's sonar.log.jsonOutput
logging:
  jsonOutput: false

tests:
  image: ""
  enabled: true
  resources:
    requests:
      cpu: 500m
      memory: 200M
      ephemeral-storage: 100M
    limits:
      cpu: 500m
      memory: 200M
      ephemeral-storage: 1000M

serviceAccount:
  create: false
  # name:
  automountToken: false
  ## Annotations for the Service Account
  annotations: {}

# extraConfig is used to load Environment Variables from Secrets and ConfigMaps
# which may have been written by other tools, such as external orchestrators.
#
# These Secrets/ConfigMaps are expected to contain Key/Value pairs, such as:
#
# apiVersion: v1
# kind: ConfigMap
# metadata:
#   name: external-sonarqube-opts
# data:
#   SONARQUBE_JDBC_USERNAME: foo
#   SONARQUBE_JDBC_URL: jdbc:postgresql://db.example.com:5432/sonar
#
# These vars can then be injected into the environment by uncommenting the following:
#
# extraConfig:
#   configmaps:
#     - external-sonarqube-opts

extraConfig:
  secrets: []
  configmaps: []

# MCP (Model Context Protocol) server deployment.
# When enabled, a separate MCP server is deployed alongside SonarQube and
# SonarQube application nodes are automatically configured to connect to it via
# SONAR_MCP_ENABLED and SONAR_MCP_SERVERURL environment variables.
mcp:
  enabled: false

  image:
    repository: sonarsource/sonarqube-mcp
    tag: "1.22.0.3040"
    pullPolicy: IfNotPresent
    # pullSecrets:
    #   - name: my-repo-secret

  port: 8080

  # healthCheckInterval sets SONAR_MCP_HEALTHCHECKINTERVAL on the SonarQube side (in seconds).
  # healthCheckInterval: "30"

  persistence:
    enabled: true
    ## Set annotations on pvc
    annotations: {}
    ## Specify an existing volume claim instead of creating a new one.
    ## When using this option storageClass, accessMode and size are ignored.
    # existingClaim: ""
    ## If defined, storageClassName: <storageClass>
    ## If set to "-", storageClassName: "", which disables dynamic provisioning
    storageClass:
    accessMode: ReadWriteOnce
    size: 1Gi

  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 30
    failureThreshold: 6
    timeoutSeconds: 1

  # Enable TLS between SonarQube and the MCP server.
  # Requires a PKCS12 or JKS keystore stored in a Kubernetes Secret.
  tls:
    enabled: false
    # Name of the Secret containing the keystore file.
    keystoreSecretName: ""
    # Key inside the Secret that holds the keystore file.
    keystoreSecretKey: "keystore.p12"
    # Name of the Secret containing the keystore password.
    passwordSecretName: ""
    # Key inside the password Secret.
    passwordSecretKey: "password"
    # Keystore format: PKCS12 or JKS.
    keystoreType: "PKCS12"

  # Set security context for the MCP container.
  containerSecurityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 0
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop: ["ALL"]

  # Additional environment variables for the MCP container.
  env: []
  # - name: MY_VAR
  #   value: my-value

  resources: {}
  # limits:
  #   cpu: 200m
  #   memory: 256Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

  # Set annotations for the MCP pod.
  annotations: {}

# SonarQube Unified Agentic Harness: Agent Orchestrator (one, shared) + per-family Agentic Job
# Runtimes (hunter, remediation). Requires jdbcOverwrite (always true in DCE) to reuse the
# SonarQube DB, and real orchestrator/runtime images before enabling.
agenticHarness:
  enabled: false

  # Render NetworkPolicies for the (untrusted) runtime families only, independent of the top-level
  # `networkPolicy.enabled`. This locks down each runtime's egress to DNS, the orchestrator, and its
  # own `egressAllow` entries - without imposing a NetworkPolicy on the orchestrator or the SonarQube
  # app/search nodes. The runtime NetworkPolicies also render when `networkPolicy.enabled` is true.
  runtimeNetworkPolicy:
    enabled: false

  # gVisor (runsc) sandboxing for untrusted workloads. The agentic job runtimes are its primary
  # consumer (agentic-runtime.yaml sets runtimeClassName when gvisor.enabled). It installs runsc on
  # nodes and/or creates a cluster-scoped RuntimeClass that pods opt into. Both toggles off by
  # default. See README ("gVisor sandboxing"); the installer is self-managed nodes only and runs a
  # privileged, host-mutating DaemonSet.
  gvisor:
    enabled: false
    # Name of the RuntimeClass created + referenced by runtimes. RuntimeClass is cluster-scoped:
    # installing this chart as multiple releases/namespaces with the same value will collide
    # (the second install fails, RuntimeClass owned by the first release) — give each release a
    # distinct runtimeClassName if you do that.
    runtimeClassName: gvisor
    handler: runsc                    # containerd runtime handler
    # RuntimeClass.scheduling.nodeSelector, and (when installer.enabled) the label the installer
    # applies once runsc is ready. Use `null`, not `{}`, to disable node pinning — Helm merges maps.
    nodeSelector:
      gvisor.enabled: "true"
    installer:
      enabled: false                  # deploy the privileged installer DaemonSet (needs gvisor.enabled)
      image:
        repository: debian
        tag: stable-slim
        pullPolicy: IfNotPresent
        # pullSecrets:
        #   - name: my-repo-secret
      # Pinned gVisor release for reproducible installs (not "latest"); bump deliberately.
      # See https://github.com/google/gvisor/tags for the release list.
      runscVersion: "20260706"
      containerdConfigPath: /etc/containerd/config.toml
      # Rendered to /etc/containerd/runsc.toml. network=host avoids gVisor's netstack breaking
      # cluster DNS/kube-proxy — unrelated to Kubernetes hostNetwork; pod isolation is unaffected.
      runscConfig:
        network: host
        overlay2: "root:self,size=50g"
      resources: {}
      nodeSelector: {}                # which nodes to install on (empty = all)
      tolerations:                    # run everywhere incl. tainted/control-plane nodes
        - operator: Exists
      annotations: {}

  # Dedicated ServiceAccounts for the agentic workloads. When create=true, one ServiceAccount is
  # rendered per component (the orchestrator plus each enabled runtime family) instead of sharing
  # the main SonarQube ServiceAccount, so each can bind its own cloud identity (e.g. an AWS IAM role
  # via IRSA) through annotations. When create=false the agentic pods keep using the main
  # `serviceAccount` (backwards-compatible default).
  serviceAccount:
    create: false
    automountToken: false
    # Annotations applied to every agentic ServiceAccount, e.g.
    #   eks.amazonaws.com/role-arn: arn:aws:iam::<account>:role/approles/agentic-orchestrator-<env>
    annotations: {}

  orchestrator:
    image:
      repository: ""
      tag: ""
      pullPolicy: IfNotPresent
      # pullSecrets:
      #   - name: my-repo-secret
    port: 8080
    replicaCount: 1
    resources: {}
    securityContext: {}

    # ServiceAccount for the orchestrator pod (rendered only when agenticHarness.serviceAccount.create
    # is true). `name` pins the SA name so an external IAM trust policy can reference an exact k8s
    # subject; defaults to <fullname>-agentic-orchestrator. `annotations` merge over (and win against)
    # the shared agenticHarness.serviceAccount.annotations.
    serviceAccount:
      name: ""
      annotations: {}

    # Object storage (S3/MinIO) for the shared job folder -> AGENTIC_STORAGE_* env
    storage:
      # Custom S3 endpoint (e.g. MinIO). Leave blank for real AWS S3 so the SDK uses its regional
      # endpoint. pathStyle should be true for MinIO, false for AWS S3 (virtual-hosted style).
      endpoint: ""
      region: us-east-1
      bucket: agentic-jobs
      pathStyle: true
      # Credentials. Leave accessKey/secretKey/existingSecret all blank for credential-less access:
      # the orchestrator's AWS SDK then falls back to its default credential chain (the pod's IAM
      # identity - node instance role, or IRSA via agenticHarness.serviceAccount annotations).
      # Inline access/secret key; ignored when existingSecret is set
      accessKey: ""
      secretKey: ""
      # Existing secret providing AGENTIC_STORAGE_ACCESS_KEY / AGENTIC_STORAGE_SECRET_KEY
      existingSecret: ""

    # Bearer token for AGENTIC_SONARQUBE_URL's /api/issues/search, used by the remediation
    # dispatcher to enrich issues before pushing a job. Blank -> anonymous access (fails against a
    # SonarQube instance that requires auth; the remediation job then fails at dispatch).
    sonarqubeToken:
      # Inline token; ignored when existingSecret is set -> AGENTIC_SONARQUBE_TOKEN
      token: ""
      # Existing secret providing the token
      existingSecret: ""
      # Key within existingSecret; defaults to AGENTIC_SONARQUBE_TOKEN
      existingSecretKey: ""

    # Remediation flow: push a fix branch and open a PR via the GitHub REST API. No token is
    # configured here: since SONAR-30903 the orchestrator obtains a short-lived GitHub App
    # installation token from SonarQube on demand (via sonarqubeToken above), right
    # before each git operation. Configure a GitHub App DevOps integration on SonarQube and bind
    # the project for the PR flow to succeed.
    github:
      # AGENTIC_GITHUB_API_BASE_URL; blank -> orchestrator's own default (real api.github.com).
      # Override for GitHub Enterprise Server, or to point at a local mock.
      apiBaseUrl: ""

    # Extra egress destinations for the orchestrator NetworkPolicy (DB / storage / SCM),
    # in addition to the runtimes and the SonarQube app nodes which are always allowed.
    # Each entry is either { cidr } or { podSelector [, namespaceSelector] } - use podSelector
    # for in-cluster dependencies, since a NetworkPolicy ipBlock can never match a Service's
    # ClusterIP (kube-proxy DNATs before policy enforcement sees the packet).
    # Optional `ports` ([{ port, protocol }]) scopes the rule; omit to allow all ports to the peer.
    # Scope broad CIDRs (e.g. 0.0.0.0/0 for S3 over presigned URLs) to `port: 443` so they don't
    # reopen all egress.
    egressAllow: []
    # - cidr: 10.0.0.0/8
    #   ports:
    #     - port: 443
    #       protocol: TCP
    # - podSelector:
    #     matchLabels:
    #       app: my-in-cluster-db
    #   namespaceSelector:
    #     matchLabels:
    #       kubernetes.io/metadata.name: db-namespace

  # One Deployment+Service per enabled family. Each gets its own push URL from the orchestrator.
  runtimes:
    hunter:
      enabled: false
      image:
        repository: ""
        tag: ""
        pullPolicy: IfNotPresent
      port: 8090
      # >1 enables the L4 429 re-routing: the Service is a load-balanced ClusterIP (not
      # headless) so a rejected request's retry gets a fresh TCP handshake routed to another
      # replica by kube-proxy.
      replicaCount: 1
      resources: {}
      securityContext: {}
      # ServiceAccount for this runtime family (rendered only when agenticHarness.serviceAccount.create
      # is true). `name` pins the SA name for an external IAM trust policy; defaults to
      # <fullname>-agentic-runtime-hunter. `annotations` merge over the shared
      # agenticHarness.serviceAccount.annotations.
      serviceAccount:
        name: ""
        annotations: {}
      # Extra env vars for the runtime container. The chart only sets `port` on the Service /
      # containerPort - it does not assume a listen-port convention for arbitrary runtime images
      # (Spring Boot images read SERVER_PORT; others may hardcode their port or use something
      # else), so set whatever env var your image needs here to make it actually listen on
      # `port`. Also where you'd set an image-specific LLM endpoint override, etc.
      env: []
      # - name: SERVER_PORT
      #   value: "8090"
      # Extra volumes/mounts for the runtime container/pod - e.g. a custom CA cert for a network
      # that TLS-inspects egress to the LLM endpoint (the JVM/language runtime's own trust store is
      # separate from the OS's, so a system-level fix alone isn't enough; mount the cert here and
      # have the image import it at startup, same idea as charts/sonarqube-dce's caCerts feature).
      extraVolumes: []
      # - name: custom-ca
      #   secret:
      #     secretName: my-runtime-custom-ca
      extraVolumeMounts: []
      # - name: custom-ca
      #   mountPath: /custom-ca
      #   readOnly: true
      # Runtime egress = storage + LLM only, never SonarQube/DB/other runtimes.
      # Add the CIDR(s) of your LLM provider; e.g. Anthropic publishes 160.79.104.0/23.
      egressAllow: []
      # - cidr: 160.79.104.0/23
    remediation:
      enabled: false # enable once the remediation runtime image is available
      image:
        repository: ""
        tag: ""
        pullPolicy: IfNotPresent
      port: 8090
      replicaCount: 1
      resources: {}
      securityContext: {}
      # ServiceAccount for this runtime family (rendered only when agenticHarness.serviceAccount.create
      # is true). `name` pins the SA name for an external IAM trust policy; defaults to
      # <fullname>-agentic-runtime-remediation. `annotations` merge over the shared
      # agenticHarness.serviceAccount.annotations.
      serviceAccount:
        name: ""
        annotations: {}
      env: []
      extraVolumes: []
      extraVolumeMounts: []
      # Runtime egress = storage + LLM only, never SonarQube/DB/other runtimes.
      # Add the CIDR(s) of your LLM provider; e.g. Anthropic publishes 160.79.104.0/23.
      egressAllow: []
      # - cidr: 160.79.104.0/23

