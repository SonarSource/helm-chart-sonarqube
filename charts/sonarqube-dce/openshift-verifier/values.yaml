OpenShift:
  enabled: true
  route:
    enabled: true

searchNodes:
  replicaCount: 1
  image:
    repository: "sonarsource/sonarqube"
    tag: "2026.4.0-master-datacenter-search"
    pullPolicy: Always
    pullSecrets:
      - name: pullsecret

ApplicationNodes:
  replicaCount: 1
  jwtSecret: "dZ0EB0KxnF++nr5+4vfTCaun/eWbv6gOoXodiAMqcFo="
  image:
    repository: "sonarsource/sonarqube"
    tag: "2026.4.0-master-datacenter-app"
    pullPolicy: Always
    pullSecrets:
      - name: pullsecret

monitoringPasscode: "test"

# Connection to external PostgreSQL
jdbcOverwrite:
  enabled: true
  jdbcUrl: "jdbc:postgresql://external-postgres-postgresql.sonarqube-dce.svc.cluster.local:5432/postgres"
  jdbcUsername: "postgres"
  jdbcSecretName: "external-postgres-postgresql"
  jdbcSecretPasswordKey: "postgres-password"

# gVisor is enabled for the Kind chart-testing run via ci/ci-values.yaml, which the OpenShift
# chart-verifier also auto-loads. The verifier installs as a namespace-restricted user that cannot
# create the installer's cluster-scoped resources (RuntimeClass, ClusterRole/Binding), and the
# host-mutating installer is not meant for managed platforms like OpenShift — so disable it here.
agenticHarness:
  gvisor:
    enabled: false