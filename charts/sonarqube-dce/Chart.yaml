annotations:
  artifacthub.io/changes: |
    - kind: changed
      description: "Upgrade Chart's version to 2026.5.0"
    - kind: removed
      description: "Remove the deprecated ingress-nginx.enabled/nginx.enabled bundled ingress-nginx controller subchart dependency; ingress.enabled remains supported for a self-managed controller, or use httproute (Gateway API)"
    - kind: added
      description: "Add optional gVisor (runsc) sandboxing for the Agentic Job Runtimes"
    - kind: added
      description: "Add the SonarQube Unified Agentic Harness (Agent Orchestrator and per-family Agentic Job Runtimes) via agenticHarness.enabled"
  artifacthub.io/links: |
    - name: support
      url: https://community.sonarsource.com/
    - name: Chart Source
      url: https://github.com/SonarSource/helm-chart-sonarqube/tree/master/charts/sonarqube-dce
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/images: |
    - name: sonarqube-app
      image: sonarqube:2026.4.0-datacenter-app
    - name: sonarqube-search
      image: sonarqube:2026.4.0-datacenter-search
    - name: sonarqube-mcp
      image: sonarsource/sonarqube-mcp:1.22.0.3040
  charts.openshift.io/name: sonarqube-dce
