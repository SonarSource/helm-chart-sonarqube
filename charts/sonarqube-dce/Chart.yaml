apiVersion: v2
name: sonarqube-dce
description: SonarQube is a self-managed, automatic code review tool that systematically helps you deliver clean code. As a core element of our Sonar solution, SonarQube integrates into your existing workflow and detects issues in your code to help you perform continuous code inspections of your projects. The tool analyses 30+ different programming languages and integrates into your CI pipeline and DevOps platform to ensure that your code meets high-quality standards.
type: application
version: 2026.4.0
appVersion: 2026.3.1
keywords:
  - coverage
  - security
  - code
  - quality
home: https://www.sonarqube.org/
icon: https://raw.githubusercontent.com/SonarSource/sonarqube-static-resources/master/helm/SonarQubeServerLogo.png
sources:
  - https://github.com/SonarSource/helm-chart-sonarqube/tree/master/charts/sonarqube-dce
  - https://github.com/SonarSource/docker-sonarqube
  - https://github.com/SonarSource/sonarqube
kubeVersion: ">= 1.24.0-0"
maintainers:
  - name: carminevassallo
    email: carmine.vassallo@sonarsource.com
  - name: emma44-m
    email: emma.mansalier@sonarsource.com
  - name: hatem-amairi-sonarsource
    email: hatem.amairi@sonarsource.com
  - name: jimil09
    email: jimil.desai@sonarsource.com
  - name: julienlancelot
    email: julien.lancelot@sonarsource.com
  - name: lukasz-jarocki-sonarsource
    email: lukasz.jarocki@sonarsource.com
  - name: matteo-mara-sonarsource
    email: matteo.mara@sonarsource.com
  - name: navyatejaotturu-sonarsource
    email: navya.otturu@sonarsource.com
annotations:
  artifacthub.io/changes: |
    - kind: changed
      description: "Upgrade Chart's version to 2026.4.0"
    - kind: changed
      description: "Upgrade SonarQube Community build to 26.6.0.123539"
    - kind: added
      description: "Add searchNodes.extraInitContainers and applicationNodes.extraInitContainers for per-node-type extra init containers"
    - kind: deprecated
      description: "Deprecate root-level extraInitContainers in favour of node-specific values"
    - kind: added
      description: "Add CA certificate support with multi-cert bundling to install-plugins init container"
    - kind: fixed
      description: "Fix multi-cert CA bundle handling in install-oracle-jdbc-driver init container"
    - kind: added
      description: "Add IPv6 support for DCE cluster node address resolution"
    - kind: fixed
      description: "Fix DCE health probes for IPv6"
    - kind: fixed
      description: "Fix NetworkPolicy blocking IPv6 egress"
  artifacthub.io/links: |
    - name: support
      url: https://community.sonarsource.com/
    - name: Chart Source
      url: https://github.com/SonarSource/helm-chart-sonarqube/tree/master/charts/sonarqube-dce
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/images: |
    - name: sonarqube-app
      image: sonarqube:2026.3.1-datacenter-app
    - name: sonarqube-search
      image: sonarqube:2026.3.1-datacenter-search
    - name: sonarqube-mcp
      image: sonarsource/sonarqube-mcp:1.22.0.3040
  charts.openshift.io/name: sonarqube-dce
dependencies:
  - name: ingress-nginx
    version: 4.14.3
    repository: https://kubernetes.github.io/ingress-nginx
    condition: nginx.enabled,ingress-nginx.enabled
